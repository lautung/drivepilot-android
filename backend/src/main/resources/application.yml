spring:
  application:
    name: phonecar-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/phonecar}
    username: ${DB_USERNAME:phonecar}
    password: ${DB_PASSWORD:phonecar_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_SIZE:10MB}
      max-request-size: ${MEDIA_MAX_SIZE:10MB}

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

phonecar:
  auth:
    jwt-secret: ${JWT_SECRET:dev-only-change-this-secret-at-least-32-bytes}
    access-token-ttl: ${ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:P30D}
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin-change-me}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://10.0.2.2:9000}
    access-key: ${MINIO_ACCESS_KEY:phonecar_minio}
    secret-key: ${MINIO_SECRET_KEY:phonecar_minio_dev}
    bucket: ${MINIO_BUCKET:phonecar-media}
    region: ${MINIO_REGION:us-east-1}
    presigned-url-ttl: ${MINIO_PRESIGNED_TTL:PT15M}
